version: 0.2

phases:
  install:
    runtime-versions:
      java: corretto21
  pre_build:
    commands:
      - echo Starting Pre-build Phase
  build:
    commands:
      - echo Building, Testing And Packaging The Application.
      - mvn clean package
  post_build:
    commands:
      - echo Build, Test And Packaging Completed.

artifacts:
  files:
    - target/*.jar
  discard-paths: yes

cache:
  paths:
    - '/root/.m2/**/*'